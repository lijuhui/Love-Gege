<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💕 情侣点餐系统 - 爱心便当</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Comic Neue', 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'Apple SD Gothic Neo', cursive, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ffd1d1 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        /* 可爱漂浮爱心背景 */
        body::before {
            content: "❤️💕💖💗💓";
            position: fixed;
            bottom: 10px;
            right: 10px;
            font-size: 80px;
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 10px rgba(255,255,255,0.5);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .header {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            position: relative;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.95;
        }
        
        .header .heart-icon {
            font-size: 40px;
            animation: heartbeat 1.5s ease infinite;
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 装饰小爱心 */
        .header::before,
        .header::after {
            content: "❤️";
            position: absolute;
            font-size: 20px;
            opacity: 0.5;
        }
        
        .header::before {
            top: 15px;
            left: 20px;
            animation: float 3s ease infinite;
        }
        
        .header::after {
            bottom: 15px;
            right: 20px;
            animation: float 3s ease infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .menu-content {
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            background: #fff9f9;
        }
        
        /* 自定义滚动条 */
        .menu-content::-webkit-scrollbar {
            width: 6px;
        }
        
        .menu-content::-webkit-scrollbar-track {
            background: #ffe4e4;
            border-radius: 10px;
        }
        
        .menu-content::-webkit-scrollbar-thumb {
            background: #ff8e8e;
            border-radius: 10px;
        }
        
        .category {
            margin-bottom: 25px;
        }
        
        .category-title {
            font-size: 20px;
            font-weight: bold;
            color: #ff6b6b;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 3px dotted #ffb3b3;
            display: inline-block;
        }
        
        .menu-item {
            padding: 12px 16px;
            margin: 8px 0;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            border: 1px solid #ffe0e0;
        }
        
        .menu-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(255,107,107,0.2);
        }
        
        .menu-item.selected {
            background: linear-gradient(135deg, #ffb6b9 0%, #ff8e8e 100%);
            color: white;
            border-color: #ff6b6b;
        }
        
        .menu-item.selected label {
            color: white;
        }
        
        .menu-item input {
            margin-right: 15px;
            width: 24px;
            height: 24px;
            cursor: pointer;
            accent-color: #ff6b6b;
        }
        
        .menu-item label {
            flex: 1;
            font-size: 16px;
            cursor: pointer;
            font-weight: 500;
            color: #555;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            padding: 20px;
            background: #fff5f5;
            border-top: 1px solid #ffe0e0;
        }
        
        button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        button:active {
            transform: scale(0.96);
        }
        
        .btn-confirm {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(255,107,107,0.3);
        }
        
        .btn-clear {
            background: #ffe0e0;
            color: #ff6b6b;
        }
        
        .btn-select-all {
            background: #fff0f0;
            color: #ff8e8e;
            border: 1px solid #ffcccc;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #fff5f5 0%, #ffffff 100%);
            border-radius: 50px;
            padding: 30px 25px;
            max-width: 90%;
            width: 360px;
            text-align: center;
            animation: slideIn 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 2px solid #ffcccc;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .modal-content h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
            font-size: 26px;
        }
        
        .order-list {
            text-align: left;
            margin: 20px 0;
            max-height: 300px;
            overflow-y: auto;
            background: #fff9f9;
            padding: 15px;
            border-radius: 25px;
        }
        
        .order-item {
            padding: 8px 12px;
            border-bottom: 1px solid #ffe0e0;
            font-size: 14px;
            color: #555;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .send-status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 25px;
            font-size: 14px;
            display: none;
        }
        
        .send-status.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .send-status.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        
        .send-status.sending {
            background: #ffeff0;
            color: #ff6b6b;
            display: block;
        }
        
        .loading {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #ffcccc;
            border-top: 2px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .close-btn {
            background: linear-gradient(135deg, #ffb6b9 0%, #ff8e8e 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .close-btn:active {
            transform: scale(0.96);
        }
        
        /* 爱心提示 */
        .love-tip {
            text-align: center;
            padding: 10px 20px;
            background: #fff0f0;
            font-size: 12px;
            color: #ff8e8e;
            border-top: 1px solid #ffe0e0;
        }
        
        .love-tip span {
            display: inline-block;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="heart-icon">💕</div>
            <h1>🍜 格格御膳房</h1>
            <p>选你想吃的，我来准备 💖</p>
        </div>
        
        <div class="menu-content" id="menuContent"></div>
        
        <div class="button-group">
            <button class="btn-select-all" onclick="selectAll()">✨ 全选</button>
            <button class="btn-clear" onclick="clearAll()">🗑️ 清空</button>
            <button class="btn-confirm" onclick="confirmOrder()">💌 确认发送</button>
        </div>
        
        <div class="love-tip">
            <span>💗</span> 想吃什么就点什么，爱你哟 <span>💗</span>
        </div>
    </div>
    
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <h2>💌 宝贝的订单</h2>
            <div class="order-list" id="orderList"></div>
            <div id="sendStatus" class="send-status"></div>
            <button class="close-btn" onclick="closeModal()">❤️ 收到 ❤️</button>
        </div>
    </div>
    
    <script>
        // ==================== 配置区域 ====================
        // 固定接收邮箱（你的139邮箱）
        const FIXED_EMAIL = "15952039339@139.com";
        
        // EmailJS 配置
        const EMAILJS_PUBLIC_KEY = "fIO_Wgb2cNTjR-CS5";
        const EMAILJS_SERVICE_ID = "service_0jezwpj";
        const EMAILJS_TEMPLATE_ID = "template_p1h8b6m";
        
        // ==================== 可爱菜单数据 ====================
        const menuData = {
            "🍖 肉肉专区": ["鱼香肉丝🌶️🌶️", "宫保鸡丁🌶️🌶️🌶️", "麻婆豆腐", "回锅肉", "糖醋里脊", "水煮鱼", "红烧肉", "可乐鸡翅"],
            "🥗 清爽小菜": ["拍黄瓜", "凉拌木耳", "口水鸡", "皮蛋豆腐", "凉拌海带丝", "蒜泥白肉", "凉拌三丝"],
            "🍚 主食宝贝": ["米饭", "炒饭", "炒面", "饺子", "馒头", "包子", "面条", "蛋炒饭"],
            "🍲 暖心汤羹": ["西红柿蛋汤", "紫菜蛋花汤", "酸辣汤", "玉米羹", "排骨汤", "鸡汤", "南瓜汤"],
            "🥤 快乐水": ["可乐", "雪碧", "橙汁", "矿泉水", "啤酒", "凉茶", "椰汁", "奶茶"]
        };
        
        let selectedItems = new Set();
        
        // 初始化 EmailJS
        emailjs.init(EMAILJS_PUBLIC_KEY);
        
        // 渲染菜单
        function renderMenu() {
            const menuContent = document.getElementById('menuContent');
            menuContent.innerHTML = '';
            
            for (const [category, items] of Object.entries(menuData)) {
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category';
                categoryDiv.innerHTML = `<div class="category-title">${category}</div>`;
                
                items.forEach(item => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'menu-item';
                    if (selectedItems.has(item)) {
                        itemDiv.classList.add('selected');
                    }
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = selectedItems.has(item);
                    checkbox.onchange = (e) => {
                        e.stopPropagation();
                        if (checkbox.checked) {
                            selectedItems.add(item);
                        } else {
                            selectedItems.delete(item);
                        }
                        renderMenu();
                    };
                    
                    const label = document.createElement('label');
                    label.textContent = item;
                    label.onclick = () => {
                        checkbox.checked = !checkbox.checked;
                        if (checkbox.checked) {
                            selectedItems.add(item);
                        } else {
                            selectedItems.delete(item);
                        }
                        renderMenu();
                    };
                    
                    itemDiv.appendChild(checkbox);
                    itemDiv.appendChild(label);
                    categoryDiv.appendChild(itemDiv);
                });
                
                menuContent.appendChild(categoryDiv);
            }
        }
        
        // 全选
        function selectAll() {
            for (const items of Object.values(menuData)) {
                items.forEach(item => selectedItems.add(item));
            }
            renderMenu();
        }
        
        // 清空
        function clearAll() {
            selectedItems.clear();
            renderMenu();
        }
        
        // 生成可爱订单文本
        function generateOrderText() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { hour12: false });
            let orderText = `💕 ========== 亲爱的订单来啦 ========== 💕\n`;
            orderText += `💗 点餐时间：${timeStr}\n`;
            orderText += `💗 订单编号：${Date.now()}\n`;
            orderText += `💗 宝贝点了：${selectedItems.size} 道菜\n\n`;
            orderText += `🍽️ 【宝贝想吃】🍽️\n`;
            
            const itemsArray = Array.from(selectedItems);
            itemsArray.forEach((item, index) => {
                orderText += `${index + 1}. ${item}\n`;
            });
            
            orderText += `\n💖 ================================== 💖\n`;
            orderText += `💗 辛苦宝贝准备啦，爱你哟！💗\n`;
            orderText += `💗 收到请回复确认 💗`;
            return orderText;
        }
        
        // 发送邮件到固定邮箱
        async function sendToFixedEmail() {
            const orderText = generateOrderText();
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', { hour12: false });
            
            try {
                const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
                    to_email: FIXED_EMAIL,
                    time: timeStr,
                    order_id: Date.now().toString(),
                    order_count: selectedItems.size.toString(),
                    message: orderText
                });
                
                console.log('发送成功:', response);
                return { success: true, message: '💌 订单已发送给亲爱的啦！💌' };
            } catch (error) {
                console.error('发送失败:', error);
                return { success: false, message: '💔 发送失败：' + (error.text || error.message) + ' 💔' };
            }
        }
        
        // 显示订单弹窗
        async function confirmOrder() {
            closeModal();
            
            if (selectedItems.size === 0) {
                alert('💕 宝贝，至少选一道菜嘛~ 我会心疼你饿肚子的 💕');
                return;
            }
            
            // 显示订单详情
            const orderList = document.getElementById('orderList');
            orderList.innerHTML = '';
            
            const itemsArray = Array.from(selectedItems);
            itemsArray.forEach((item, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'order-item';
                itemDiv.textContent = `${index + 1}. ${item}`;
                orderList.appendChild(itemDiv);
            });
            
            const totalDiv = document.createElement('div');
            totalDiv.className = 'order-item';
            totalDiv.style.fontWeight = 'bold';
            totalDiv.style.marginTop = '10px';
            totalDiv.textContent = `💗 共 ${selectedItems.size} 道菜 💗`;
            orderList.appendChild(totalDiv);
            
            // 显示弹窗
            document.getElementById('orderModal').style.display = 'flex';
            
            // 显示发送中状态
            const statusDiv = document.getElementById('sendStatus');
            statusDiv.className = 'send-status sending';
            statusDiv.innerHTML = '<span class="loading"></span> 💕 正在把订单发给亲爱的... 💕';
            statusDiv.style.display = 'block';
            
            // 发送邮件
            const result = await sendToFixedEmail();
            
            if (result.success) {
                statusDiv.className = 'send-status success';
                statusDiv.innerHTML = '✅ ' + result.message;
            } else {
                statusDiv.className = 'send-status error';
                statusDiv.innerHTML = '❌ ' + result.message + '<br>📋 订单已复制，可以手动发给亲爱的哟';
                await navigator.clipboard.writeText(generateOrderText());
            }
        }
        
        // 关闭弹窗
        function closeModal() {
            const modal = document.getElementById('orderModal');
            if (modal) {
                modal.style.display = 'none';
            }
            const statusDiv = document.getElementById('sendStatus');
            if (statusDiv) {
                statusDiv.className = 'send-status';
                statusDiv.style.display = 'none';
            }
        }
        
        // 初始化
        renderMenu();
        
        // 点击弹窗外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('orderModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
